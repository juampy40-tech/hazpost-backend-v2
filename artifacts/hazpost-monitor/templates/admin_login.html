<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — HazPost Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 1.25rem; color: #38bdf8; font-weight: 700; margin-bottom: 0.25rem; }
    .login-card p { color: #64748b; font-size: 0.875rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    input[type="password"] { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.65rem 1rem; color: #e2e8f0; font-size: 0.95rem; outline: none; transition: border-color .2s; }
    input[type="password"]:focus { border-color: #38bdf8; }
    .btn { display: block; width: 100%; margin-top: 1.25rem; padding: 0.7rem; background: #0369a1; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn:hover { background: #0284c7; }
    .error { margin-top: 1rem; padding: 0.6rem 1rem; background: #7f1d1d; border-radius: 8px; color: #f87171; font-size: 0.85rem; }
    .lock { font-size: 2rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="lock">🔒</div>
    <h1>HazPost Monitor</h1>
    <p>Panel de administración — acceso restringido</p>
    <form method="post" action="/admin/login">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" required />
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>
</body>
</html>
